replicaCount: 1

image:
  repository: github-app
  tag: dev
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

containerPort: 8080

resources: {}

podAnnotations: {}

nodeSelector: {}

tolerations: []

affinity: {}

ingress:
  enabled: true
  className: nginx
  host: github-app.localdev.me
  path: /
  pathType: Prefix
  annotations: {}
  tls:
    enabled: true
    secretName: github-app-tls

certManager:
  enabled: true
  clusterIssuer:
    name: letsencrypt-staging
  localFallbackIssuer:
    enabled: false
    name: selfsigned-local

secrets:
  githubWebhookSecretRef:
    name: github-app-secrets
    key: github-webhook-secret
  githubAppRef:
    name: github-app-secrets
    appIdKey: github-app-id
    installationIdKey: github-app-installation-id
    privateKeyKey: github-app-private-key

probes:
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3

extraEnv: []
