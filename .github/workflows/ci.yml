name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify module checksums
        run: go mod verify

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Verify formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4

      - name: Run tests with coverage
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

      - name: Update coverage badge files
        run: |
          total="$(go tool cover -func=coverage.out | awk '/^total:/ {print $NF}')"
          pct="${total%%%}"
          color="$(awk -v p="$pct" 'BEGIN {
            if (p >= 90) print "brightgreen";
            else if (p >= 80) print "green";
            else if (p >= 70) print "yellowgreen";
            else if (p >= 60) print "yellow";
            else if (p >= 50) print "orange";
            else print "red";
          }')"

          mkdir -p .github/badges
          cat > .github/badges/coverage.json <<EOF
          {"schemaVersion":1,"label":"coverage","message":"${total}","color":"${color}"}
          EOF

          badge_url="https://img.shields.io/badge/coverage-${pct}%25-${color}"
          awk -v badge_url="$badge_url" '
            /^\[!\[Coverage\]\(https:\/\/img\.shields\.io\/badge\/coverage-/ {
              print "[![Coverage](" badge_url ")](https://github.com/bwalsh/github-app/actions/workflows/ci.yml)"
              next
            }
            { print }
          ' README.md > README.md.tmp
          mv README.md.tmp README.md

      - name: Commit coverage badge update
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if git diff --quiet -- .github/badges/coverage.json README.md; then
            echo "Coverage badge is up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage.json README.md
          git commit -m "ci: update coverage badge [skip ci]"
          git push

      - name: Build
        run: go build -trimpath ./cmd/github-app

  integration:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4


      - name: Set up Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: github-app

      - name: Run Kind integration deploy/verify
        # CI_WEBHOOK_SECRET can be any non-empty repository secret for this ephemeral integration test.
        # If it is unset, scripts/kind-deploy-verify.sh generates a random ephemeral value.
        env:
          GITHUB_WEBHOOK_SECRET: ${{ secrets.CI_WEBHOOK_SECRET }}
        run: make kind-deploy-verify

      - name: Clean up Kind resources
        if: always()
        run: make kind-clean
