name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test -race -count=1 ./...

      - name: Build
        run: go build -trimpath ./cmd/github-app

  integration:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: github-app

      - name: Run Kind integration deploy/verify
        env:
          GITHUB_WEBHOOK_SECRET: ci-integration-secret
        run: make kind-deploy-verify

      - name: Clean up Kind resources
        if: always()
        run: make kind-clean
