name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify module checksums
        run: go mod verify

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Verify formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7
        with:
          version: v2.11.4

      - name: Run tests with coverage
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage
          path: coverage.out

      - name: Build
        run: go build -trimpath ./cmd/github-app

  coverage-badge:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download coverage artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: coverage
          path: .

      - name: Update coverage badge payload
        run: |
          coverage_file="coverage.out"
          if [ ! -f "$coverage_file" ]; then
            coverage_file="$(find . -maxdepth 3 -type f -name coverage.out | head -n 1)"
          fi
          if [ -z "$coverage_file" ] || [ ! -f "$coverage_file" ]; then
            echo "coverage.out not found after artifact download" >&2
            exit 1
          fi

          total="$(go tool cover -func="$coverage_file" | awk '/^total:/ {print $NF}')"
          pct="${total%%%}"
          color="$(awk -v p="$pct" 'BEGIN {
            if (p >= 90) print "brightgreen";
            else if (p >= 80) print "green";
            else if (p >= 70) print "yellowgreen";
            else if (p >= 60) print "yellow";
            else if (p >= 50) print "orange";
            else print "red";
          }')"

          mkdir -p .github/badges
          cat > .github/badges/coverage.json <<EOF
          {"schemaVersion":1,"label":"coverage","message":"${total}","color":"${color}"}
          EOF

      - name: Commit coverage badge update
        run: |
          if git diff --quiet -- .github/badges/coverage.json; then
            echo "Coverage badge is up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage.json
          git commit -m "ci: update coverage badge [skip ci]"
          git push

  integration:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4


      - name: Set up Kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          cluster_name: github-app

      - name: Run Kind integration deploy/verify
        # CI_WEBHOOK_SECRET can be any non-empty repository secret for this ephemeral integration test.
        # If it is unset, scripts/kind-deploy-verify.sh generates a random ephemeral value.
        env:
          GITHUB_WEBHOOK_SECRET: ${{ secrets.CI_WEBHOOK_SECRET }}
        run: make kind-deploy-verify

      - name: Clean up Kind resources
        if: always()
        run: make kind-clean
